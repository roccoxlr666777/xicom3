<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Crazy Day: Influencer English Exam</title>
    <style>
        :root { --bg-color: #ffffff; --text-color: #000000; --border-width: 4px; --error-color: #d9534f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        h1, h2 { text-transform: uppercase; font-weight: 900; }
        .mono { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
        button, .btn { display: inline-block; background: var(--bg-color); color: var(--text-color); border: var(--border-width) solid var(--text-color); padding: 12px 24px; font-weight: bold; cursor: pointer; box-shadow: 4px 4px 0px var(--text-color); margin-top: 10px; }
        button:hover { background: var(--text-color); color: var(--bg-color); }
        input, textarea, select { width: 100%; padding: 15px; border: var(--border-width) solid var(--text-color); font-family: 'Courier New', Courier, monospace; margin-bottom: 15px; outline: none; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; padding-top: 100px; }
        .phase-screen { display: none; }
        .phase-screen.active { display: block; }
        .story-box { border-left: 8px solid var(--text-color); padding: 15px 20px; background: #f0f0f0; margin-bottom: 25px; }
        .grammar-tag { background: var(--text-color); color: #fff; padding: 5px 10px; display: inline-block; font-size: 0.9rem; margin-bottom: 10px; }
        #dashboard { position: fixed; top: 0; left: 0; width: 100%; background: #fff; border-bottom: 4px solid #000; z-index: 1000; padding: 15px; display: none; }
        .page-break { page-break-before: always; }
        @media print { #dashboard, .btn-no-print { display: none !important; } }
    </style>
</head>
<body>

    <div id="dashboard">
        <div style="display:flex; justify-content:space-between;">
            <div class="mono">TIEMPO: <span id="dash-time">40:00</span></div>
            <div class="mono">LIKES: <span id="dash-score">0</span></div>
        </div>
    </div>

    <div class="container">
        <div id="landing" class="phase-screen active">
            <h1>URBAN INFLUENCER: A CRAZY DAY</h1>
            <p>Elige tu meta (cada 100k es una pregunta). Tienes 40 minutos.</p>
            <input type="text" id="studentName" placeholder="Nombre">
            <select id="goalFollowers">
                <option value="500000">500,000 Likes (5 Fases)</option>
                <option value="1000000" selected>1,000,000 Likes (10 Fases)</option>
            </select>
            <button class="btn" onclick="startExam()">INICIAR ▶</button>
        </div>

        <!-- Fases Dinámicas se generan por JS -->
        <div id="dynamic-content"></div>

        <!-- Resultados -->
        <div id="results">
            <div class="certificate">
                <h1>OFFICIAL INFLUENCER PLAQUE</h1>
                <h1 id="r-score" style="font-size:3rem;">0 LIKES</h1>
            </div>
            <div class="page-break"></div>
            <div class="certificate">
                <h1>PLACA OFICIAL</h1>
                <h1 id="r-score-es">0 SEGUIDORES</h1>
                <button class="btn btn-no-print" onclick="window.print()">IMPRIMIR</button>
            </div>
        </div>
    </div>

    <script>
        const ANS = {
            1: ["could we start the interview", "can we start the interview", "shall we start the interview", "may we start the interview"],
            2: "i had worked hard",
            3: "an object is landing",
            4: "the ending was terrible",
            5: "i will be driving fast",
            6: "shall we draft the contract",
            7: "i have been waiting for hours",
            8: "i was watching tv when you called",
            9: "i have made a mistake",
            10: "we will have reached one million"
        };

        let followers = 0, goal = 0, currentStep = 0, timer = 2400; // 40 minutos

        function startExam() {
            goal = parseInt(document.getElementById('goalFollowers').value);
            document.getElementById('dashboard').style.display = 'block';
            setInterval(() => {
                timer--;
                document.getElementById('dash-time').innerText = Math.floor(timer/60) + ":" + (timer%60).toString().padStart(2,'0');
                if(timer <= 0) finishExam();
            }, 1000);
            renderPhases();
        }

        function renderPhases() {
            let num = goal / 100000;
            let html = "";
            for(let i=1; i<=num; i++) {
                html += `
                <div id="phase${i}" class="phase-screen">
                    <h2>FASE ${i}</h2>
                    <div class="grammar-tag">USAR: ${getGrammarLabel(i)}</div>
                    <div class="story-box">Traduce: "${getPrompt(i)}"</div>
                    <input type="text" id="ans${i}">
                    <button class="btn" onclick="evaluatePhase(${i})">EVALUAR</button>
                </div>`;
            }
            document.getElementById('dynamic-content').innerHTML = html;
            document.getElementById('phase1').classList.add('active');
        }

        function getGrammarLabel(i) {
            const labels = ["MODAL VERB (Could/Can/Shall/May)", "PAST PERFECT", "PRESENT CONTINUOUS", "SIMPLE PAST", "FUTURE CONTINUOUS", "MODAL VERB (Shall)", "PRESENT PERFECT CONTINUOUS", "PAST CONTINUOUS", "PRESENT PERFECT", "FUTURE PERFECT"];
            return labels[i-1];
        }

        function getPrompt(i) {
            const prompts = ["¿Podríamos comenzar la entrevista?", "Yo había trabajado duro.", "Un objeto está aterrizando.", "El final fue terrible.", "Yo estaré conduciendo rápido.", "¿Redactaremos el contrato?", "He estado esperando por horas.", "Estaba viendo TV cuando llamaste.", "He cometido un error.", "Nosotros habremos alcanzado un millón."];
            return prompts[i-1];
        }

        function evaluatePhase(i) {
            let val = document.getElementById('ans'+i).value.toLowerCase().trim();
            let correct = Array.isArray(ANS[i]) ? ANS[i].includes(val) : val === ANS[i];
            
            if(correct) followers += 100000;
            else followers = Math.max(0, followers - 50000);
            
            document.getElementById('dash-score').innerText = followers;
            if(document.getElementById('phase'+(i+1))) {
                document.getElementById('phase'+i).classList.remove('active');
                document.getElementById('phase'+(i+1)).classList.add('active');
            } else {
                finishExam();
            }
        }

        function finishExam() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('dynamic-content').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('r-score').innerText = followers + " LIKES";
            document.getElementById('r-score-es').innerText = followers + " SEGUIDORES";
        }
    </script>
</body>
</html>
